name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
         cd app
         pip install -r requirements.txt

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit scan
        run: bandit -r app --exclude app/venv,app/__pycache__

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit scan
        run: |
          bandit -r app --exclude app/venv,app/__pycache__

name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt

      - name: Install security tools
        run: |
          pip install bandit safety==2.3.5

      - name: Run Bandit scan
        run: |
          bandit -r app --exclude app/venv,app/__pycache__

      - name: Run Safety scan
        run: |
          cd app
          safety check -r requirements.txt

      # -------- DOCKER BUILD --------

      - name: Build Docker image
        run: |
          docker build -t devsecops-app ./app

      # -------- TRIVY INSTALL --------

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb stable main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # -------- TRIVY SCAN --------

      - name: Scan Docker image
        run: |
          trivy image devsecops-app
